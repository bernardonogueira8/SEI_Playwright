name: Code Quality

on: [push, pull_request]
jobs:
    quality:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  pip install black ruff

            - name: Check formatting with Black
              run: black . --check --diff
